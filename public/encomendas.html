<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopSync — Encomendas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#f5f5f3; --surface:#ffffff; --surface-2:#f0efea;
      --border:rgba(0,0,0,0.08); --border-md:rgba(0,0,0,0.14);
      --text:#1a1a18; --text-2:#6b6b68; --text-3:#9a9a97;
      --green:#1D9E75; --green-dark:#0F6E56; --green-bg:#E1F5EE; --green-text:#0F6E56;
      --blue:#185FA5; --blue-bg:#E6F1FB; --blue-text:#185FA5;
      --amber:#BA7517; --amber-bg:#FAEEDA; --amber-text:#854F0B;
      --coral:#D85A30; --coral-bg:#FAECE7; --coral-text:#993C1D;
      --red-bg:#FCEBEB; --red-text:#A32D2D;
      --radius-md:8px; --radius-lg:12px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1a1a18; --surface:#242422; --surface-2:#2e2e2b; --border:rgba(255,255,255,0.08); --border-md:rgba(255,255,255,0.14); --text:#f0efea; --text-2:#9a9a97; --text-3:#6b6b68; --green-bg:#0a2e22; --green-text:#5DCAA5; --blue-bg:#0c1f35; --blue-text:#85B7EB; --amber-bg:#2a1e08; --amber-text:#EF9F27; --coral-bg:#2a1208; --coral-text:#F0997B; --red-bg:#2a0a0a; --red-text:#F09595; }
    }
    html, body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }
    .shell { display:flex; min-height:100vh; }
    .sidebar { width:220px; flex-shrink:0; background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; padding:1.5rem 1rem; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .sidebar-logo { font-size:18px; font-weight:600; color:var(--text); margin-bottom:2rem; letter-spacing:-0.02em; padding:0 8px; display:flex; align-items:center; gap:8px; }
    .sidebar-logo span { color:var(--green); }
    .nav-section { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-3); padding:0 8px; margin-bottom:6px; margin-top:1.2rem; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-md); font-size:13px; color:var(--text-2); cursor:pointer; text-decoration:none; transition:background 0.15s,color 0.15s; margin-bottom:2px; }
    .nav-item:hover { background:var(--surface-2); color:var(--text); }
    .nav-item.active { background:var(--green-bg); color:var(--green-text); font-weight:500; }
    .nav-badge { margin-left:auto; font-size:10px; background:var(--amber-bg); color:var(--amber-text); padding:2px 7px; border-radius:20px; font-weight:500; }
    .nav-divider { height:0.5px; background:var(--border); margin:10px 8px; }
    .nav-svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .sidebar-footer { margin-top:auto; padding:12px 8px 0; border-top:0.5px solid var(--border); }
    .main { flex:1; min-width:0; padding:2rem; overflow-x:hidden; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:12px; }
    .topbar-left h1 { font-size:20px; font-weight:600; letter-spacing:-0.02em; }
    .topbar-left p { font-size:13px; color:var(--text-2); margin-top:2px; }
    .topbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    select.ctrl, button.ctrl, a.ctrl { font-size:13px; padding:7px 12px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); cursor:pointer; transition:background 0.15s; text-decoration:none; display:inline-flex; align-items:center; }
    select.ctrl:hover, button.ctrl:hover, a.ctrl:hover { background:var(--surface-2); }
    button.ctrl-primary, a.ctrl-primary { background:var(--green); color:#fff; border-color:var(--green); }
    button.ctrl-primary:hover, a.ctrl-primary:hover { background:var(--green-dark); }
    .card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.2rem 1.4rem; margin-bottom:1.5rem; }
    .metrics-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.5rem; }
    @media (max-width:700px) { .metrics-row { grid-template-columns:repeat(2,1fr); } }
    .metric { background:var(--surface-2); border-radius:var(--radius-md); padding:14px 16px; }
    .metric-label { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-3); margin-bottom:8px; }
    .metric-value { font-size:24px; font-weight:600; letter-spacing:-0.02em; color:var(--text); line-height:1; }
    .metric-delta { font-size:12px; margin-top:6px; }
    .delta-up { color:var(--green-text); }
    .delta-dn { color:var(--coral-text); }
    .filters-bar { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; }
    .search-input { flex:1; min-width:200px; padding:8px 12px; border-radius:var(--radius-md); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); font-size:13px; }
    .search-input:focus { outline:none; border-color:var(--green); }
    .tabs { display:flex; border-bottom:0.5px solid var(--border); margin-bottom:1rem; flex-wrap:wrap; }
    .tab { font-size:13px; padding:8px 14px; color:var(--text-2); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--green); border-bottom-color:var(--green); font-weight:500; }
    .table-scroll { overflow-x:auto; }
    .otable { width:100%; border-collapse:collapse; font-size:13px; white-space:nowrap; }
    .otable th { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-3); text-align:left; padding:6px 10px; border-bottom:0.5px solid var(--border); }
    .otable td { padding:10px 10px; border-bottom:0.5px solid var(--border); }
    .otable tr:last-child td { border-bottom:none; }
    .otable tr:hover td { background:var(--surface-2); }
    .badge { font-size:11px; padding:3px 9px; border-radius:20px; font-weight:500; white-space:nowrap; }
    .b-pending    { background:var(--amber-bg); color:var(--amber-text); }
    .b-sent       { background:var(--blue-bg);  color:var(--blue-text); }
    .b-delivered  { background:var(--green-bg); color:var(--green-text); }
    .b-cancelled  { background:var(--red-bg);   color:var(--red-text); }
    .b-not_started { background:var(--amber-bg); color:var(--amber-text); }
    .b-in_progress { background:var(--blue-bg);  color:var(--blue-text); }
    .b-fulfilled  { background:var(--green-bg); color:var(--green-text); }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border-md); border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
    .dot-ok { background:var(--green); }
    .dot-err { background:var(--coral); }
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-3); }
    .empty-state p { font-size:13px; margin-top:8px; }
    @media (max-width:680px) { .sidebar{display:none;} .main{padding:1rem;} }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="8" height="8" rx="2" fill="#1D9E75"/><rect x="12" y="2" width="8" height="8" rx="2" fill="#1D9E75" opacity=".5"/><rect x="2" y="12" width="8" height="8" rx="2" fill="#1D9E75" opacity=".5"/><rect x="12" y="12" width="8" height="8" rx="2" fill="#1D9E75"/></svg>
      Shop<span>Sync</span>
    </div>
    <div class="nav-section">Gestão</div>
    <a class="nav-item" href="index.html"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a class="nav-item active" href="encomendas.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Encomendas<span class="nav-badge" id="pendingBadge">0</span></a>
    <a class="nav-item" href="stock.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 7H4a1 1 0 00-1 1v10a1 1 0 001 1h16a1 1 0 001-1V8a1 1 0 00-1-1z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>Stock</a>
    <a class="nav-item" href="produtos.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Produtos</a>
    <div class="nav-divider"></div>
    <div class="nav-section">Plataformas</div>
    <a class="nav-item" href="https://www.ebay.co.uk/sh/ovw" target="_blank"><svg class="nav-svg" viewBox="0 0 24 24" style="color:var(--blue);"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg><span style="flex:1;">eBay</span><svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="color:var(--text-3);"><path d="M2 2h6v6M2 8l6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></a>
    <a class="nav-item" href="https://www.vinted.co.uk/member/inbox" target="_blank"><svg class="nav-svg" viewBox="0 0 24 24" style="color:var(--green);"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg><span style="flex:1;">Vinted</span><svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="color:var(--text-3);"><path d="M2 2h6v6M2 8l6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></a>
    <div class="sidebar-footer">
      <div style="font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px;">
        <span class="status-dot dot-ok" id="dbStatusDot"></span>
        <span id="dbStatusText">A ligar...</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Encomendas</h1>
        <p id="subtitleText">A carregar...</p>
      </div>
      <div class="topbar-right">
        <select class="ctrl" id="periodSel" onchange="carregarEncomendas()">
          <option value="7">7 dias</option>
          <option value="30" selected>30 dias</option>
          <option value="90">90 dias</option>
          <option value="365">1 ano</option>
        </select>
        <button class="ctrl" onclick="carregarEncomendas()">↻ Atualizar</button>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric"><div class="metric-label">Total</div><div class="metric-value" id="m-total"><span class="spinner"></span></div><div class="metric-delta delta-up">encomendas</div></div>
      <div class="metric"><div class="metric-label">Receita</div><div class="metric-value" id="m-receita"><span class="spinner"></span></div><div class="metric-delta delta-up">neste período</div></div>
      <div class="metric"><div class="metric-label">Pendentes</div><div class="metric-value" id="m-pend"><span class="spinner"></span></div><div class="metric-delta delta-dn">aguardam envio</div></div>
      <div class="metric"><div class="metric-label">Entregues</div><div class="metric-value" id="m-del"><span class="spinner"></span></div><div class="metric-delta delta-up">concluídas</div></div>
    </div>

    <div class="card">
      <div class="filters-bar">
        <input class="search-input" type="text" id="searchInput" placeholder="Pesquisar por produto, comprador ou referência..." oninput="filtrar()"/>
        <select class="ctrl" id="contaFilter" onchange="filtrar()">
  <option value="">Todas as contas</option>
  <option value="Nilson Ebay">Nilson eBay</option>
  <option value="Jaque Ebay">Jaque eBay</option>
  <option value="4Bliss Ebay">4Bliss eBay</option>
  <option value="Nilson Vinted">Nilson Vinted</option>
  <option value="4Bliss Vinted">4Bliss Vinted</option>
</select>
        <select class="ctrl" id="plataformaFilter" onchange="filtrar()">
          <option value="">Todas as plataformas</option>
          <option value="eBay">eBay</option>
          <option value="Vinted">Vinted</option>
        </select>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="setTab('all',this)">Todas</button>
        <button class="tab" onclick="setTab('pending',this)">Pendentes</button>
        <button class="tab" onclick="setTab('sent',this)">Enviadas</button>
        <button class="tab" onclick="setTab('delivered',this)">Entregues</button>
        <button class="tab" onclick="setTab('cancelled',this)">Canceladas</button>
      </div>
      <div class="table-scroll">
        <table class="otable">
          <thead><tr>
            <th>Referência</th><th>Produto</th><th>Conta</th>
            <th>Comprador</th><th>Valor</th><th>Estado</th><th>Data</th>
          </tr></thead>
          <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:2.5rem;color:var(--text-3);"><span class="spinner"></span> A carregar encomendas...</td></tr></tbody>
        </table>
      </div>
      <div style="margin-top:1rem;font-size:12px;color:var(--text-3);text-align:right;" id="countLabel"></div>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL      = "https://ndftougvhysmcunoiomz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZnRvdWd2aHlzbWN1bm9pb216Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTg4NDUsImV4cCI6MjA4OTA3NDg0NX0.QOzFHPrwlhYIJYDAd8gKgR9q2tsYFDbUvL8KMq7hUzA";
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CONTA_CORES = {
    'Nilson Ebay':   '#185FA5',
    '4Bliss Ebay':   '#1D9E75',
    'Jaque Ebay':    '#BA7517',
    'Nilson Vinted': '#5DCAA5',
    '4Bliss Vinted': '#0F6E56',
  };

  const STATUS_MAP = {
    pending:     ['b-pending',     'Pendente'],
    sent:        ['b-sent',        'Enviada'],
    delivered:   ['b-delivered',   'Entregue'],
    cancelled:   ['b-cancelled',   'Cancelada'],
    NOT_STARTED: ['b-not_started', 'Por iniciar'],
    IN_PROGRESS: ['b-in_progress', 'Em curso'],
    FULFILLED:   ['b-fulfilled',   'Concluída'],
    not_started: ['b-not_started', 'Por iniciar'],
    in_progress: ['b-in_progress', 'Em curso'],
    fulfilled:   ['b-fulfilled',   'Concluída'],
  };

  let allOrders = [], currentTab = 'all';

  async function carregarEncomendas() {
    const dias = parseInt(document.getElementById('periodSel').value);
    const desde = new Date();
    desde.setDate(desde.getDate() - dias);
    try {
      const { data, error } = await db
        .from('vendas')
        .select('*')
        .gte('data_venda', desde.toISOString())
        .order('data_venda', { ascending: false });
      if (error) throw error;
      allOrders = data || [];
      setDbStatus(true, 'Supabase ligado');
    } catch(e) {
      setDbStatus(false, 'Erro na ligação');
      allOrders = [];
    }
    renderMetricas();
    filtrar();
    document.getElementById('subtitleText').textContent = allOrders.length + ' encomendas nos últimos ' + dias + ' dias';
    const pending = allOrders.filter(v => ['pending','NOT_STARTED','not_started'].includes(v.estado)).length;
    document.getElementById('pendingBadge').textContent = pending;
  }

  function renderMetricas() {
    const total    = allOrders.length;
    const receita  = allOrders.reduce((s,v) => s + parseFloat(v.valor||0), 0);
    const pending  = allOrders.filter(v => ['pending','NOT_STARTED','not_started'].includes(v.estado)).length;
    const entregue = allOrders.filter(v => ['delivered','FULFILLED','fulfilled'].includes(v.estado)).length;
    document.getElementById('m-total').textContent   = total;
    document.getElementById('m-receita').textContent = '£' + receita.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('m-pend').textContent    = pending;
    document.getElementById('m-del').textContent     = entregue;
  }

  function filtrar() {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const conta = document.getElementById('contaFilter').value;
    const plat  = document.getElementById('plataformaFilter').value;
    let filtered = [...allOrders];
    if (currentTab === 'pending')   filtered = filtered.filter(v => ['pending','NOT_STARTED','not_started'].includes(v.estado));
    else if (currentTab === 'sent') filtered = filtered.filter(v => ['sent','IN_PROGRESS','in_progress'].includes(v.estado));
    else if (currentTab === 'delivered') filtered = filtered.filter(v => ['delivered','FULFILLED','fulfilled'].includes(v.estado));
    else if (currentTab === 'cancelled') filtered = filtered.filter(v => v.estado === 'cancelled');
    if (conta) filtered = filtered.filter(v => v.conta === conta);
    if (plat)  filtered = filtered.filter(v => v.plataforma === plat);
    if (q)     filtered = filtered.filter(v =>
      (v.produto||'').toLowerCase().includes(q) ||
      (v.comprador||'').toLowerCase().includes(q) ||
      (v.order_id||'').toLowerCase().includes(q) ||
      (v.conta||'').toLowerCase().includes(q)
    );
    renderTabela(filtered);
  }

  function renderTabela(vendas) {
    const tbody = document.getElementById('tbody');
    document.getElementById('countLabel').textContent = vendas.length + ' resultado' + (vendas.length !== 1 ? 's' : '');
    if (!vendas.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">Sem encomendas<p>Tente ajustar os filtros ou o período</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = vendas.map(v => {
      const [sc, sl] = STATUS_MAP[v.estado] || ['b-pending', v.estado || '—'];
      const ref = '#' + (v.order_id||v.id||'').toString().replace('ebay_','').replace('vinted_','').slice(-6).toUpperCase();
      const dt  = new Date(v.data_venda).toLocaleDateString('pt-PT', { day:'numeric', month:'short', year:'numeric' });
      const cor = CONTA_CORES[v.conta] || '#888';
      return '<tr>' +
        '<td style="color:var(--text-3);font-family:monospace;font-size:12px;">' + ref + '</td>' +
        '<td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;">' + (v.produto||'—') + '</td>' +
        '<td><span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;background:'+cor+'22;color:'+cor+';">' + (v.conta||v.plataforma||'—') + '</span></td>' +
        '<td style="color:var(--text-2);">' + (v.comprador||'—') + '</td>' +
        '<td style="font-weight:600;">£' + parseFloat(v.valor||0).toFixed(2) + '</td>' +
        '<td><span class="badge ' + sc + '">' + sl + '</span></td>' +
        '<td style="color:var(--text-3);">' + dt + '</td>' +
        '</tr>';
    }).join('');
  }

  function setTab(t, el) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    currentTab = t;
    filtrar();
  }

  function setDbStatus(ok, msg) {
    document.getElementById('dbStatusDot').className = 'status-dot ' + (ok ? 'dot-ok' : 'dot-err');
    document.getElementById('dbStatusText').textContent = msg;
  }

  carregarEncomendas();
</script>
</body>
</html>
